<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Blaine's Queer Speed Matching</title>
    {% if refresh_url %}
    <script>
        const es = new EventSource("{{ refresh_url }}");
        es.addEventListener("update", () => { console.log("update!"); location.reload() });

        // Reconnect automatically if the connection drops — the browser does this
        // for you with EventSource, but you can add a visibility handler too:
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && es.readyState === EventSource.CLOSED) {
                location.reload(); // catch any missed events while tab was hidden
            }
        });
    </script>
    {% endif %}
</head>

<body>
    <div id="header">
        <div class="titlebox">
            <h1><a href="{{ url_for('index') }}">Blaine's Queer Speed Matching</a></h1>
        </div>
        <div class="menu">
            <a href="{{ url_for('user_page') }}">{% if user %}{{ user.name }}{% else %}Guest{% endif %}</a>
        </div>
    </div>
    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
    <div id="footer">
        By Blaine Rogers. Copyright 2026.
    </div>
</body>

</html>
