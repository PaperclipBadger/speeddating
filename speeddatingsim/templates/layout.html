<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Blaine's Queer Speed Matching</title>
    {% if refresh_url %}
    <script>
        const es = new EventSource("{{ refresh_url }}");
        es.addEventListener("update", () => location.reload());
    </script>
    {% endif %}
</head>

<body>
    <div id="header">
        <div class="titlebox">
            <h1><a href="{{ url_for('index') }}">Blaine's Queer Speed Matching</a></h1>
        </div>
        <div class="menu">
            Profile Pic Here
        </div>
    </div>
    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
    <div id="footer">
        By Blaine Rogers. Copyright 2026.
    </div>
</body>

</html>
