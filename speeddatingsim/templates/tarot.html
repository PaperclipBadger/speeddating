{% extends 'layout.html' %}

{% block content %}
<img src="{{ url_for('static', filename=card.svg_filename) }}" , style="float: right; max-width: 50%;">
<h1>{{ card.full_name }}</h1>
<blockquote>
    {% for paragraph in card.description.split("\n\n") %}
    <p>{{ paragraph | safe }}</p>
    {% endfor %}
</blockquote>
<p>&mdash;Arthur E. Waite, <i>The Pictorial Key to the Tarot</i></p>
{% endblock %}
